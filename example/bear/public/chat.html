<!DOCTYPE html>
<!--
  Build-tool-free React chat UI for the BEAR.AgUi showcase (tasks-m5, D31).

  One self-contained static page: react / react-dom (UMD) and
  @babel/standalone come from CDN script tags, JSX lives in the
  <script type="text/babel"> block below, and no Node/npm/bundler is
  involved. Served same-origin by public/server.php (GET /), so the
  fetch() to /invocations needs no CORS handling.

  Like the M4 CLI client (D30), this page depends on no library type —
  browser JS could not import PHP classes anyway — and reads only the
  wire format documented in docs/reference/ag-ui-protocol.md.
  SseFrameReader and ConversationLog below mirror the state machines of
  example/cli-client/src/SseFrameReader.php and ConversationLog.php
  one-to-one (same logic, reimplemented per platform — not shared).
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BEAR.AgUi — chat</title>
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
  <!-- Assistant text arrives as Markdown from the LLM; marked parses it and
       DOMPurify sanitizes the result before it is injected as HTML. -->
  <script src="https://unpkg.com/marked@12.0.2/marked.min.js"></script>
  <script src="https://unpkg.com/dompurify@3.1.6/dist/purify.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", sans-serif;
      background: #f4f5f7;
      color: #1f2328;
      /* Demo-friendly base size: everything using rem scales up from here so
         the UI stays legible on a projector. */
      font-size: 18px;
    }
    #root { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
    header {
      padding: 0.85rem 1.5rem;
      background: #ffffff;
      border-bottom: 1px solid #d8dce1;
    }
    header h1 { margin: 0; font-size: 1.25rem; }
    header p { margin: 0.3rem 0 0; font-size: 0.9rem; color: #6a737d; }
    main {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1rem;
    }
    .conversation {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }
    .bubble {
      max-width: 85%;
      padding: 0.7rem 1rem;
      border-radius: 0.85rem;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      line-height: 1.55;
      font-size: 1.05rem;
    }
    .user { align-self: flex-end; background: #1a56db; color: #ffffff; }
    .assistant { align-self: flex-start; background: #ffffff; border: 1px solid #d8dce1; }
    /* Rendered Markdown inside an assistant bubble. pre-wrap (inherited from
       .bubble) would double the spacing of block elements, so reset it and
       tighten the first/last child margins to keep the bubble compact. */
    .assistant.markdown { white-space: normal; }
    .markdown > :first-child { margin-top: 0; }
    .markdown > :last-child { margin-bottom: 0; }
    .markdown p { margin: 0.5em 0; }
    .markdown ul, .markdown ol { margin: 0.5em 0; padding-left: 1.4em; }
    .markdown li { margin: 0.2em 0; }
    .markdown li > p { margin: 0.2em 0; }
    .markdown h1, .markdown h2, .markdown h3, .markdown h4 { margin: 0.7em 0 0.3em; line-height: 1.3; }
    .markdown h1 { font-size: 1.3rem; }
    .markdown h2 { font-size: 1.2rem; }
    .markdown h3 { font-size: 1.1rem; }
    .markdown a { color: #1a56db; }
    .markdown blockquote {
      margin: 0.5em 0;
      padding: 0.1em 0.9em;
      border-left: 3px solid #d0d7de;
      color: #57606a;
    }
    .markdown code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.9em;
    }
    .markdown :not(pre) > code { background: #eef1f4; padding: 0.1em 0.35em; border-radius: 0.35em; }
    .markdown pre {
      background: #0d1117;
      color: #e6edf3;
      padding: 0.75rem 0.9rem;
      border-radius: 0.55rem;
      overflow-x: auto;
      margin: 0.5em 0;
    }
    .markdown pre code { background: none; padding: 0; color: inherit; font-size: 0.88rem; }
    .markdown table { border-collapse: collapse; margin: 0.5em 0; }
    .markdown th, .markdown td { border: 1px solid #d0d7de; padding: 0.3em 0.6em; }
    .markdown th { background: #f4f5f7; }
    .markdown hr { border: none; border-top: 1px solid #d8dce1; margin: 0.8em 0; }
    .markdown img { max-width: 100%; }
    .tool {
      align-self: flex-start;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.78rem;
      color: #57606a;
      background: #eef1f4;
      border-radius: 0.5rem;
      padding: 0.35rem 0.6rem;
      max-width: 85%;
      overflow-wrap: break-word;
    }
    .interrupt {
      align-self: stretch;
      background: #fff8e1;
      border: 1px solid #e6c860;
      border-radius: 0.5rem;
      padding: 0.55rem 0.8rem;
      font-size: 0.85rem;
    }
    .interrupt .note { margin-top: 0.3rem; font-size: 0.75rem; color: #8a6d1a; }
    .bubble.pending { display: flex; align-items: center; gap: 0.25rem; padding: 0.6rem 0.9rem; }
    .bubble.pending .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #9aa4af;
      animation: pending-bounce 1.2s infinite ease-in-out;
    }
    .bubble.pending .dot:nth-child(2) { animation-delay: 0.15s; }
    .bubble.pending .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes pending-bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
    .error {
      align-self: stretch;
      background: #fdecea;
      border: 1px solid #e5a09a;
      border-radius: 0.5rem;
      padding: 0.55rem 0.8rem;
      color: #b42318;
      font-size: 0.85rem;
    }
    /* The composer floats above the bottom edge as an elevated, centered
       card instead of a strip glued to the very bottom — bigger and easier
       to read on a projector during a demo. A soft gradient lets the
       conversation fade behind it rather than cut off at a hard border. */
    footer {
      padding: 1rem 1rem 1.75rem;
      background: linear-gradient(to top, #f4f5f7 55%, rgba(244, 245, 247, 0));
    }
    /* Demo prompt chips are hidden by default; this bar holds the toggle. */
    .preset-bar {
      max-width: 820px;
      margin: 0 auto 0.5rem;
      display: flex;
    }
    .preset-toggle {
      font-size: 0.85rem;
      padding: 0.25rem 0.5rem;
      border: none;
      background: none;
      color: #57606a;
      cursor: pointer;
      border-radius: 0.4rem;
    }
    .preset-toggle:hover { color: #1a56db; }
    /* One-click demo prompt chips above the composer — the presenter fills
       the composer with a complex prompt without typing it live on stage. */
    .presets {
      max-width: 820px;
      margin: 0 auto 0.6rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .presets .preset {
      font-size: 0.9rem;
      padding: 0.4rem 0.85rem;
      border: 1px solid #c7ced6;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      color: #1f2328;
      cursor: pointer;
      white-space: nowrap;
    }
    .presets .preset:hover:not(:disabled) { border-color: #1a56db; color: #1a56db; }
    .presets .preset:disabled { opacity: 0.45; cursor: default; }
    footer form {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      gap: 0.6rem;
      align-items: flex-end;
      background: #ffffff;
      border: 1px solid #d8dce1;
      border-radius: 1rem;
      padding: 0.75rem;
      box-shadow: 0 10px 34px rgba(15, 23, 42, 0.14);
    }
    footer form:focus-within { border-color: #1a56db; box-shadow: 0 10px 34px rgba(26, 86, 219, 0.22); }
    footer textarea {
      flex: 1;
      padding: 0.5rem 0.7rem;
      font-size: 1.25rem;
      line-height: 1.5;
      border: none;
      border-radius: 0.6rem;
      resize: none;
      /* Auto-grows with content (see the useLayoutEffect in App); this is
         the floor, and it only scrolls once it hits the max cap. */
      min-height: 5.5rem;
      max-height: 55vh;
      overflow-y: auto;
      font-family: inherit;
      color: inherit;
    }
    footer textarea:focus { outline: none; }
    footer button {
      padding: 0 1.6rem;
      min-height: 3.4rem;
      font-size: 1.15rem;
      font-weight: 600;
      border: none;
      border-radius: 0.7rem;
      background: #1a56db;
      color: #ffffff;
      cursor: pointer;
    }
    footer button:disabled { background: #9db3dd; cursor: default; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    'use strict';

    // LLM output is Markdown. Links open in a new tab so a demo click never
    // navigates away from the chat.
    DOMPurify.addHook('afterSanitizeAttributes', (node) => {
      if (node.tagName === 'A') {
        node.setAttribute('target', '_blank');
        node.setAttribute('rel', 'noopener noreferrer');
      }
    });

    /** Parse Markdown to sanitized HTML for dangerouslySetInnerHTML. */
    function renderMarkdown(text) {
      return DOMPurify.sanitize(marked.parse(text, { gfm: true, breaks: true }));
    }

    const stringOrEmpty = (value) => (typeof value === 'string' ? value : '');

    const stringOrNewId = (value) =>
      typeof value === 'string' && value !== '' ? value : newId();

    function newId() {
      const bytes = new Uint8Array(8);
      crypto.getRandomValues(bytes);
      return Array.from(bytes, (byte) => byte.toString(16).padStart(2, '0')).join('');
    }

    /**
     * Splits an arbitrary byte stream into complete SSE frames and decodes
     * their JSON payload — the JS mirror of the M4 CLI client's
     * SseFrameReader (PHP). A frame is any run of bytes terminated by a
     * blank line (`\n\n`); chunk boundaries from the HTTP transport are not
     * guaranteed to line up with frame boundaries, so incomplete frames are
     * buffered across feed() calls. TextDecoder runs in streaming mode so a
     * UTF-8 sequence split across chunks also survives.
     */
    class SseFrameReader {
      constructor() {
        this.buffer = '';
        this.decoder = new TextDecoder();
      }

      /** @param {Uint8Array} chunk @returns {string[]} complete frames, without the blank-line terminator */
      feed(chunk) {
        this.buffer += this.decoder.decode(chunk, { stream: true });

        const frames = [];
        let boundary = this.buffer.indexOf('\n\n');
        while (boundary !== -1) {
          frames.push(this.buffer.slice(0, boundary));
          this.buffer = this.buffer.slice(boundary + 2);
          boundary = this.buffer.indexOf('\n\n');
        }

        return frames;
      }

      /** @returns {object|null} null for non-data lines (comments, `[DONE]`, blank frames) */
      decode(frame) {
        for (const line of frame.split('\n')) {
          if (!line.startsWith('data:')) {
            continue;
          }

          const payload = line.slice('data:'.length).trim();
          if (payload === '' || payload === '[DONE]') {
            return null;
          }

          let value;
          try {
            value = JSON.parse(payload);
          } catch {
            return null;
          }

          return typeof value === 'object' && value !== null && !Array.isArray(value) ? value : null;
        }

        return null;
      }
    }

    /**
     * Reconstructs AG-UI `messages[]` (wire-format objects) from the SSE
     * events observed during each run — the JS mirror of the M4 CLI
     * client's ConversationLog (PHP). AG-UI is server-side stateless: the
     * browser is the source of truth for conversation history, and resends
     * the accumulated messages in full on every run.
     */
    class ConversationLog {
      constructor() {
        this.messages = [];
        this.openAssistantIndex = -1;
      }

      appendUser(text) {
        this.messages.push({ id: newId(), role: 'user', content: text });
      }

      observe(event) {
        switch (event.type) {
          case 'TEXT_MESSAGE_START':
            this.openAssistantMessage(event);
            break;
          case 'TEXT_MESSAGE_CONTENT':
            this.appendAssistantContent(event);
            break;
          case 'TOOL_CALL_START':
            this.openToolCall(event);
            break;
          case 'TOOL_CALL_ARGS':
            this.appendToolCallArguments(event);
            break;
          case 'TOOL_CALL_RESULT':
            this.appendToolResult(event);
            break;
          case 'RUN_FINISHED':
          case 'RUN_ERROR':
            this.closeOpenAssistantMessage();
            break;
          default:
            break;
        }
      }

      /** @returns {object[]} history accumulated so far, ending with the just-appended trigger */
      toMessages() {
        return this.messages;
      }

      openAssistantMessage(event) {
        this.messages.push({
          id: stringOrNewId(event.messageId),
          role: 'assistant',
          content: '',
        });
        this.openAssistantIndex = this.messages.length - 1;
      }

      appendAssistantContent(event) {
        if (this.openAssistantIndex < 0) {
          return;
        }

        this.messages[this.openAssistantIndex].content += stringOrEmpty(event.delta);
      }

      openToolCall(event) {
        // A tool call is not always preceded by TEXT_MESSAGE_START (a run
        // can go straight from RUN_STARTED to TOOL_CALL_START); open the
        // holding assistant message on demand in that case.
        const index = this.currentOrNewAssistantIndex();

        const message = this.messages[index];
        if (!Array.isArray(message.toolCalls)) {
          message.toolCalls = [];
        }

        message.toolCalls.push({
          id: stringOrEmpty(event.toolCallId),
          type: 'function',
          function: { name: stringOrEmpty(event.toolCallName), arguments: '' },
        });
      }

      currentOrNewAssistantIndex() {
        if (this.openAssistantIndex < 0) {
          this.messages.push({ id: newId(), role: 'assistant', content: '' });
          this.openAssistantIndex = this.messages.length - 1;
        }

        return this.openAssistantIndex;
      }

      appendToolCallArguments(event) {
        if (this.openAssistantIndex < 0) {
          return;
        }

        const toolCallId = stringOrEmpty(event.toolCallId);
        const delta = stringOrEmpty(event.delta);
        for (const toolCall of this.messages[this.openAssistantIndex].toolCalls ?? []) {
          if (toolCall.id === toolCallId) {
            toolCall.function.arguments += delta;
          }
        }
      }

      appendToolResult(event) {
        const toolCallId = stringOrEmpty(event.toolCallId);
        this.closeToolCallArguments(toolCallId);

        this.messages.push({
          id: stringOrNewId(event.messageId),
          role: 'tool',
          content: stringOrEmpty(event.content),
          toolCallId,
        });
      }

      // A tool call with no TOOL_CALL_ARGS deltas (e.g. a no-argument tool,
      // or one rejected before its args streamed) would otherwise resend an
      // empty `arguments` string — not valid JSON, and the server rejects
      // it (`function.arguments` must decode to a JSON object).
      closeToolCallArguments(toolCallId) {
        if (this.openAssistantIndex < 0) {
          return;
        }

        for (const toolCall of this.messages[this.openAssistantIndex].toolCalls ?? []) {
          if (toolCall.id === toolCallId && toolCall.function.arguments === '') {
            toolCall.function.arguments = '{}';
          }
        }
      }

      // An interrupted (or errored) run ends with TOOL_CALL_START but no
      // TOOL_CALL_RESULT, so closeToolCallArguments() above never fires for
      // that call — sweep the still-open assistant message on run close, or
      // the next turn resends `arguments: ""` and the server 400s it.
      closeOpenAssistantMessage() {
        if (this.openAssistantIndex >= 0) {
          for (const toolCall of this.messages[this.openAssistantIndex].toolCalls ?? []) {
            if (toolCall.function.arguments === '') {
              toolCall.function.arguments = '{}';
            }
          }
        }

        this.openAssistantIndex = -1;
      }
    }

    /**
     * POSTs a RunAgentInput body to /invocations (same origin — no CORS)
     * and streams the SSE response with fetch() + ReadableStream, invoking
     * onEvent for every decoded frame as it arrives (not buffered).
     * EventSource cannot be used here: AG-UI requires POST with a JSON
     * body, and EventSource only issues GET (D31).
     *
     * The two response shapes the server produces are told apart by
     * Content-Type: `text/event-stream` for a normal run,
     * `application/json` for a pre-stream 400 validation failure — the
     * same dichotomy the M4 CLI client handles.
     */
    async function streamRun(body, onEvent) {
      const response = await fetch('/invocations', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Accept: 'text/event-stream' },
        body: JSON.stringify(body),
      });

      const contentType = (response.headers.get('Content-Type') ?? '').toLowerCase();
      if (contentType.startsWith('application/json')) {
        onEvent({ type: 'RUN_ERROR', message: describeValidationError(await response.text()) });
        return;
      }

      const frameReader = new SseFrameReader();
      const reader = response.body.getReader();
      for (;;) {
        const { done, value } = await reader.read();
        if (done) {
          return;
        }

        for (const frame of frameReader.feed(value)) {
          const decoded = frameReader.decode(frame);
          if (decoded !== null) {
            onEvent(decoded);
          }
        }
      }
    }

    function describeValidationError(rawJsonBody) {
      let decoded;
      try {
        decoded = JSON.parse(rawJsonBody);
      } catch {
        return rawJsonBody;
      }

      if (typeof decoded !== 'object' || decoded === null || !Array.isArray(decoded.errors)) {
        return rawJsonBody;
      }

      const messages = decoded.errors
        .map((error) => (error !== null && typeof error === 'object' ? error.message : null))
        .filter((message) => typeof message === 'string');

      return messages.length === 0 ? rawJsonBody : messages.join('; ');
    }

    /**
     * Maps one decoded AG-UI event onto the displayed entry list — the UI
     * counterpart of the M4 CLI client's EventRenderer, expressed as a pure
     * (entries, event) => entries reducer so React state updates stay
     * immutable.
     */
    // A run has visible gaps — after RUN_STARTED, and after a tool result —
    // where the LLM is still thinking but no entry has arrived yet to show
    // it. `pending` is a transient "..." bubble for exactly those gaps: any
    // event that produces visible content strips it first, and the two
    // gap-starting events (RUN_STARTED, TOOL_CALL_RESULT) re-add it.
    function withoutPending(entries) {
      return entries.filter((entry) => entry.kind !== 'pending');
    }

    function applyEvent(entries, event) {
      const settled = withoutPending(entries);

      switch (event.type) {
        case 'RUN_STARTED':
          return [...settled, { kind: 'pending' }];
        case 'TEXT_MESSAGE_START':
          return [...settled, { kind: 'assistant', id: stringOrEmpty(event.messageId), text: '' }];
        case 'TEXT_MESSAGE_CONTENT':
          return settled.map((entry) =>
            entry.kind === 'assistant' && entry.id === event.messageId
              ? { ...entry, text: entry.text + stringOrEmpty(event.delta) }
              : entry);
        case 'TOOL_CALL_START':
          return [...settled, {
            kind: 'tool',
            id: stringOrEmpty(event.toolCallId),
            name: stringOrEmpty(event.toolCallName),
            result: null,
          }];
        case 'TOOL_CALL_RESULT':
          return [
            ...settled.map((entry) =>
              entry.kind === 'tool' && entry.id === event.toolCallId
                ? { ...entry, result: stringOrEmpty(event.content) }
                : entry),
            { kind: 'pending' },
          ];
        case 'RUN_FINISHED': {
          const outcome = event.outcome;
          if (outcome === null || typeof outcome !== 'object' || outcome.type !== 'interrupt') {
            return settled;
          }

          const texts = (Array.isArray(outcome.interrupts) ? outcome.interrupts : [])
            .map((interrupt) =>
              interrupt !== null && typeof interrupt === 'object'
                ? stringOrEmpty(interrupt.message ?? interrupt.reason)
                : '')
            .filter((text) => text !== '');

          return [...settled, { kind: 'interrupt', texts }];
        }
        case 'RUN_ERROR':
          return [...settled, { kind: 'error', text: stringOrEmpty(event.message) }];
        default:
          return settled;
      }
    }

    function Entry({ entry }) {
      switch (entry.kind) {
        case 'user':
          return <div className="bubble user">{entry.text}</div>;
        case 'assistant':
          // Some models stream a whitespace-only chunk (e.g. a lone "\n")
          // as filler right before a tool call; AG-UI-wise it's a valid
          // TEXT_MESSAGE, but showing it as an empty bubble reads as broken.
          return entry.text.trim() === ''
            ? null
            : <div className="bubble assistant markdown" dangerouslySetInnerHTML={{ __html: renderMarkdown(entry.text) }} />;
        case 'tool':
          return (
            <div className="tool">
              {entry.result === null
                ? <span>🔧 {entry.name} …</span>
                : <span>🔧 {entry.name} → {entry.result}</span>}
            </div>
          );
        case 'interrupt':
          return (
            <div className="interrupt">
              {entry.texts.map((text, index) => <div key={index}>⏸ {text}</div>)}
              <div className="note">このツール呼び出しは再開できません（v1 の既知の制約）。</div>
            </div>
          );
        case 'error':
          return <div className="error">⚠ {entry.text}</div>;
        case 'pending':
          return (
            <div className="bubble assistant pending">
              <span className="dot"></span><span className="dot"></span><span className="dot"></span>
            </div>
          );
        default:
          return null;
      }
    }

    // One-click demo prompts for the PHP Conference Japan 2026 stage: each
    // exercises the tool set (word-similarity, rot13, sun-info, packagist
    // search) and asks for a Markdown answer so rendering shows.
    // `label` is the short button text; `text` is what actually gets sent.
    const DEMO_PROMPTS = [
      {
        label: '🛠 使えるツールは？',
        text: 'あなたが使えるツールにはどんなものがありますか？'
            + 'それぞれ何ができるのか、日本語の箇条書きで分かりやすく教えて。',
      },
      {
        label: '🔀 3ツール並列＋表',
        text: '次を一度にすべて実行して、結果はMarkdownの表にまとめて日本語で答えて。'
            + '(1) "BEAR Sunday" と "BEAR.Sunday" の文字列類似度、'
            + '(2) "Framework" を ROT13 で変換、'
            + '(3) 東京の今日の日の出と日の入りの時刻。',
      },
      {
        label: '🌅 日の出・日の入りを3都市比較',
        text: '東京・大阪・札幌の今日の日の出と日の入りの時刻をそれぞれ調べて、'
            + '日の出が早い順に並べたMarkdownの表（都市・日の出・日の入り）を作り、'
            + 'いちばん早い都市を日本語で教えて。',
      },
      {
        label: '📦 Composerパッケージ検索',
        text: 'Composer(Packagist)で "bear" を含むパッケージを検索して、'
            + '見つかったものを Markdown の表（パッケージ名・説明・ダウンロード数）にまとめ、'
            + 'それぞれの用途を日本語で一言添えて。',
      },
      {
        label: '🔐 ROT13 往復',
        text: '"PHP Conference Japan 2026" を ROT13 で変換して、'
            + 'その結果をもう一度 ROT13 にかけて元の文字列に戻ることを確認して、'
            + '過程を日本語で説明して。',
      },
    ];

    function App() {
      const [entries, setEntries] = React.useState([]);
      const [input, setInput] = React.useState('');
      const [busy, setBusy] = React.useState(false);
      // Demo preset chips are hidden by default; a toggle reveals them.
      const [showPresets, setShowPresets] = React.useState(false);
      // threadId is fixed for the page session, runId is fresh per turn —
      // the client issues both (the server only validates). The log lives
      // in a ref: it is the history ledger, not render state.
      const threadIdRef = React.useRef(null);
      if (threadIdRef.current === null) {
        threadIdRef.current = newId();
      }
      const logRef = React.useRef(null);
      if (logRef.current === null) {
        logRef.current = new ConversationLog();
      }
      const scrollRef = React.useRef(null);
      const inputRef = React.useRef(null);

      React.useEffect(() => {
        const container = scrollRef.current;
        if (container !== null) {
          container.scrollTop = container.scrollHeight;
        }
      }, [entries]);

      // The input is disabled while a run streams, which drops focus;
      // give it back when the turn ends so multi-turn chat flows.
      React.useEffect(() => {
        if (!busy && inputRef.current !== null) {
          inputRef.current.focus();
        }
      }, [busy]);

      // Grow the textarea to fit its content instead of scrolling: reset to
      // auto so it can shrink, then match scrollHeight. CSS max-height caps
      // it and re-enables scrolling only past that point. Runs on every
      // input change, so typing, a preset fill, and the post-send clear all
      // resize it.
      React.useLayoutEffect(() => {
        const textarea = inputRef.current;
        if (textarea !== null) {
          textarea.style.height = 'auto';
          textarea.style.height = `${textarea.scrollHeight}px`;
        }
      }, [input]);

      // The one send path, shared by the composer (Enter / 送信) and the
      // one-click demo preset buttons — so a preset skips typing entirely.
      async function sendMessage(raw) {
        const text = raw.trim();
        if (text === '' || busy) {
          return;
        }

        setInput('');
        setBusy(true);
        const log = logRef.current;
        log.appendUser(text);
        setEntries((previous) => [...previous, { kind: 'user', text }]);

        const body = {
          threadId: threadIdRef.current,
          runId: newId(),
          messages: log.toMessages(),
        };

        try {
          await streamRun(body, (agUiEvent) => {
            log.observe(agUiEvent);
            setEntries((previous) => applyEvent(previous, agUiEvent));
          });
        } catch (error) {
          setEntries((previous) => [...previous, { kind: 'error', text: String(error) }]);
        } finally {
          setBusy(false);
        }
      }

      function handleSubmit(event) {
        event.preventDefault();
        sendMessage(input);
      }

      return (
        <React.Fragment>
          <header>
            <h1>BEAR.AgUi — chat</h1>
            <p>
              ビルドツールなしの React × AG-UI SSE。下のボタン、または「“BEAR Sunday” を ROT13 して、
              東京の日の出も教えて」のように入力してお試しください（複数ツールを並列実行します）。
            </p>
          </header>
          <main ref={scrollRef}>
            <div className="conversation">
              {entries.map((entry, index) => <Entry key={index} entry={entry} />)}
            </div>
          </main>
          <footer>
            <div className="preset-bar">
              <button
                type="button"
                className="preset-toggle"
                aria-expanded={showPresets}
                onClick={() => setShowPresets((shown) => !shown)}
              >
                {showPresets ? '▾ デモ例を隠す' : '▸ デモ例を表示'}
              </button>
            </div>
            {showPresets && (
            <div className="presets">
              {DEMO_PROMPTS.map((preset) => (
                <button
                  key={preset.label}
                  type="button"
                  className="preset"
                  title={preset.text}
                  disabled={busy}
                  onClick={() => {
                    // Fill the composer only — the presenter reviews and
                    // submits (Enter / 送信) themselves.
                    setInput(preset.text);
                    if (inputRef.current !== null) {
                      inputRef.current.focus();
                    }
                  }}
                >
                  {preset.label}
                </button>
              ))}
            </div>
            )}
            <form onSubmit={handleSubmit}>
              <textarea
                ref={inputRef}
                value={input}
                onChange={(event) => setInput(event.target.value)}
                onKeyDown={(event) => {
                  // Enter sends; Shift+Enter (or IME composition) inserts a newline.
                  if (event.key === 'Enter' && !event.shiftKey && !event.nativeEvent.isComposing) {
                    event.preventDefault();
                    handleSubmit(event);
                  }
                }}
                rows={2}
                placeholder="メッセージを入力…（Enter で送信、Shift+Enter で改行）"
                disabled={busy}
                autoFocus
              />
              <button type="submit" disabled={busy || input.trim() === ''}>
                {busy ? '…' : '送信'}
              </button>
            </form>
          </footer>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
