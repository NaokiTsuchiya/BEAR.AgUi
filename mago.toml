#:schema https://mago.carthage.software/1.30.0/schema.json
# Welcome to Mago!
# For full documentation, see https://mago.carthage.software/1.30.0/en/tools/overview/
version = "1"
php-version = "8.2.0"

[source]
workspace = "."
paths = ["src/", "tests", "example/"]
includes = ["vendor"]
excludes = []

[source.glob]
literal-separator = true

[formatter]
preset = "default"
null-type-hint = "NullPipeLast"

[linter]
integrations = ["phpunit"]

[linter.rules]
ambiguous-function-call = { enabled = false }
literal-named-argument = { enabled = false }
halstead = { effort-threshold = 7000 }

[analyzer]
plugins = []
find-unused-definitions = true
find-unused-expressions = true
find-overly-wide-return-types = true
analyze-dead-code = true
memoize-properties = true
check-throws = true
check-missing-override = true
find-unused-parameters = true
check-property-initialization = true
class-initializers = ["setUp"]
strict-list-index-checks = true
strict-array-index-existence = true
no-boolean-literal-comparison = true
check-missing-type-hints = true
check-closure-missing-type-hints = true
check-arrow-function-missing-type-hints = true
trust-existence-checks = false
check-use-statements = true
check-name-casing = true
enforce-class-finality = true
require-api-or-internal = true
check-experimental = true
allow-side-effects-in-conditions = false

unchecked-exceptions = ["Error", "LogicException", "PHPUnit\\Framework\\Exception"]
unchecked-exception-classes = []

# Architecture boundaries: lock the dependency rules in docs/architecture.md
# §1 / §8 mechanically. The Event/ and Sse/ layers must never reach into
# bear/tool-use; only the ToolUse/ and Adapter/ layers may bind to it.
[guard]
mode = "perimeter"
# example/*/public/index.php are unnamespaced entry scripts: perimeter rules
# match by namespace, so they can only ever hit the default deny. Their
# boundary ("no bear/tool-use in the HTTP layer", tasks-m2 T8) stays a
# review concern, like tests/.
excludes = ["tests/**", "example/*/public/**"]

[guard.perimeter]
# AgUiRunner (root namespace) is the composition root; the more specific
# sub-namespace layers below win for everything under it.
layers.facade = ["NaokiTsuchiya\\BEARAgUi\\"]
layers.event = ["NaokiTsuchiya\\BEARAgUi\\Event\\"]
layers.sse = ["NaokiTsuchiya\\BEARAgUi\\Sse\\"]
layers.input = ["NaokiTsuchiya\\BEARAgUi\\Input\\"]
layers.tooluse = ["NaokiTsuchiya\\BEARAgUi\\ToolUse\\"]
layers.adapter = ["NaokiTsuchiya\\BEARAgUi\\Adapter\\"]
layers.runtime = ["NaokiTsuchiya\\BEARAgUi\\Runtime\\"]
layers.bear-tool-use = ["BEAR\\ToolUse\\"]
layers.example-shared = ["Example\\Shared\\"]
layers.example-server = ["Example\\Server\\"]
layers.example-stub = ["Example\\StubLlm\\"]
layers.example-bear = ["Example\\Bear\\"]

[[guard.perimeter.rules]]
# Event/ is a pure AG-UI serialization layer: no internal cross-layer deps,
# and explicitly must not touch BEAR\ToolUse.
namespace = "NaokiTsuchiya\\BEARAgUi\\Event\\"
permit = ["@native", "@self"]

[[guard.perimeter.rules]]
# Sse/ frames Event/ instances; it cannot reach BEAR\ToolUse either.
# Swoole\Http\Response is the one runtime handle SwooleSseSink (the S4
# swap point for Swoole hosts, D29) writes to; ext-swoole stays in
# require-dev + suggest.
namespace = "NaokiTsuchiya\\BEARAgUi\\Sse\\"
permit = ["@native", "@self", "NaokiTsuchiya\\BEARAgUi\\Event\\", "Swoole\\Http\\Response"]

[[guard.perimeter.rules]]
# Runtime/ is the Swoole-parallel agent loop (D29): it re-implements the
# reason/act loop from bear/tool-use building blocks, wires the ToolUse/
# recording shim per run, and fans plain tool calls out on Swoole
# coroutines. Swoole access is limited to the coroutine primitives.
namespace = "NaokiTsuchiya\\BEARAgUi\\Runtime\\"
permit = [
    "@native",
    "@self",
    "BEAR\\ToolUse\\",
    "NaokiTsuchiya\\BEARAgUi\\ToolUse\\",
    "Swoole\\Coroutine",
    "Swoole\\Coroutine\\WaitGroup",
]

[[guard.perimeter.rules]]
# Input/ is host-facing input boundary; pure AG-UI, no ToolUse.
namespace = "NaokiTsuchiya\\BEARAgUi\\Input\\"
permit = ["@native", "@self"]

[[guard.perimeter.rules]]
# ToolUse/ is the enrichment shim — explicitly bound to BEAR\ToolUse.
# Input/ is allowed so MessageHistoryMapper can consume the typed AG-UI
# message graph (Message variants, AssistantToolCall, etc.) without
# re-walking raw arrays.
namespace = "NaokiTsuchiya\\BEARAgUi\\ToolUse\\"
permit = [
    "@native",
    "@self",
    "BEAR\\ToolUse\\",
    "NaokiTsuchiya\\BEARAgUi\\Input\\",
    "NaokiTsuchiya\\BEARAgUi\\Input\\Message\\",
]

[[guard.perimeter.rules]]
# Adapter/ converts AgentEvent → AG-UI events using the registry.
namespace = "NaokiTsuchiya\\BEARAgUi\\Adapter\\"
permit = [
    "@native",
    "@self",
    "Psr\\Log\\",
    "NaokiTsuchiya\\BEARAgUi\\Event\\",
    "NaokiTsuchiya\\BEARAgUi\\ToolUse\\",
    "BEAR\\ToolUse\\",
]

[[guard.perimeter.rules]]
# AgUiRunner is the facade that orchestrates a run into an AG-UI event
# stream (architecture §1). It reaches Input / ToolUse / Adapter plus
# BEAR\ToolUse (AgentOptions), and names Event/ in its return type. It does
# NOT render — the host wires the Sse layer — so the facade touches neither
# Sse\ nor Psr\Log. Example\ is deliberately absent from every library
# permit list above: src/ must never reference example/ (tasks-m2 T8).
namespace = "NaokiTsuchiya\\BEARAgUi\\"
permit = [
    "@native",
    "@self",
    "BEAR\\ToolUse\\",
    "NaokiTsuchiya\\BEARAgUi\\Input\\",
    "NaokiTsuchiya\\BEARAgUi\\Adapter\\",
    "NaokiTsuchiya\\BEARAgUi\\ToolUse\\",
    "NaokiTsuchiya\\BEARAgUi\\Event\\",
]

# --- example/ boundaries (tasks-m2 T8) ---------------------------------
# The library never references Example\ (enforced by the whitelists above),
# and example code never reaches into tests/: the test namespaces (Fake\,
# Support\, ...) live under NaokiTsuchiya\BEARAgUi\, which the example rules
# below only open class-by-class / sub-namespace-by-sub-namespace.
# example/*/public/index.php scripts are unnamespaced and thus outside
# perimeter matching — the "no bear/tool-use in the HTTP layer" rule stays
# a review concern.

[[guard.perimeter.rules]]
# The stub LLM is plain PHP: no library, no vendor, nothing.
namespace = "Example\\StubLlm\\"
permit = ["@native", "@self"]

[[guard.perimeter.rules]]
# The OpenAI conversion layer (D28, shared by M2/M3) binds bear/tool-use
# types to openai-php — and nothing else. No BEAR.Sunday, no library code,
# no Example\Server / Example\StubLlm.
namespace = "Example\\Shared\\"
permit = [
    "@native",
    "@self",
    "BEAR\\ToolUse\\",
    "OpenAI\\",
]

[[guard.perimeter.rules]]
# Demo tools only declare bear/tool-use schema; they see no LLM, no library.
namespace = "Example\\Server\\Tool\\"
permit = [
    "@native",
    "@self",
    "BEAR\\ToolUse\\Schema\\",
]

[[guard.perimeter.rules]]
# The example host wires the shared OpenAI layer + demo tools into the
# library facade. Library access is opened per symbol/sub-namespace on
# purpose: the root prefix would also admit the test namespaces (Fake\,
# Support\), which example/ must never touch (tasks-m2 T8).
namespace = "Example\\Server\\"
permit = [
    "@native",
    "@self",
    "Example\\Shared\\",
    "BEAR\\ToolUse\\Dispatch\\",
    "BEAR\\ToolUse\\Schema\\",
    "OpenAI",
    "OpenAI\\",
    "Psr\\Log\\",
    "NaokiTsuchiya\\BEARAgUi\\AgUiRunner",
    "NaokiTsuchiya\\BEARAgUi\\Adapter\\",
    "NaokiTsuchiya\\BEARAgUi\\Sse\\",
    "NaokiTsuchiya\\BEARAgUi\\ToolUse\\",
]

[[guard.perimeter.rules]]
# The BEAR showcase app (M3, D25-D29): BEAR.Resource + Ray.Di +
# bear/tool-use + the shared OpenAI layer + the library facade, plus the
# Swoole response handle its per-request responder carries. Library access
# is opened per symbol / sub-namespace on purpose — the root prefix would
# also admit the test namespaces (Fake\, Support\), which example/ must
# never touch (tasks-m2 T8, tasks-m3 T11).
namespace = "Example\\Bear\\"
permit = [
    "@native",
    "@self",
    "Example\\Shared\\",
    "BEAR\\Resource\\",
    "BEAR\\ToolUse\\",
    "OpenAI",
    "OpenAI\\",
    "Psr\\Log\\",
    "Ray\\Di\\",
    "Swoole\\Http\\Response",
    "NaokiTsuchiya\\BEARAgUi\\AgUiRunner",
    "NaokiTsuchiya\\BEARAgUi\\Adapter\\",
    "NaokiTsuchiya\\BEARAgUi\\Event\\",
    "NaokiTsuchiya\\BEARAgUi\\Input\\",
    "NaokiTsuchiya\\BEARAgUi\\Runtime\\",
    "NaokiTsuchiya\\BEARAgUi\\Sse\\",
    "NaokiTsuchiya\\BEARAgUi\\ToolUse\\",
]
